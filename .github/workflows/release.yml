name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install tools
        run: |
          sudo apt-get update && sudo apt-get install -y pandoc
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.2

      - name: Build man pages
        run: make man

      - name: Cross-compile
        run: |
          mkdir -p dist
          LDFLAGS="-s -w"
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/orktree-linux-amd64 ./cmd/orktree
          GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/orktree-linux-arm64 ./cmd/orktree

      - name: Package
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for GOARCH in amd64 arm64; do
            export ARCH="$GOARCH" VERSION
            # nfpm expands ${VAR} in top-level scalar fields but not in
            # contents[].src paths, so pre-expand the whole config with envsubst.
            envsubst < nfpm.yaml > /tmp/nfpm-expanded.yaml
            case "$GOARCH" in
              amd64) RPM_ARCH="x86_64" ;;
              arm64) RPM_ARCH="aarch64" ;;
            esac
            nfpm package --packager deb --config /tmp/nfpm-expanded.yaml --target "dist/orktree_${VERSION}_${GOARCH}.deb"
            nfpm package --packager rpm --config /tmp/nfpm-expanded.yaml --target "dist/orktree-${VERSION}-1.${RPM_ARCH}.rpm"
          done

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*
