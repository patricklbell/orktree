name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: |
          LDFLAGS="-s -w"
          GOOS=linux GOARCH=amd64  go build -ldflags "$LDFLAGS" -o janus-linux-amd64  ./cmd/janus
          GOOS=linux GOARCH=arm64  go build -ldflags "$LDFLAGS" -o janus-linux-arm64  ./cmd/janus

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            janus-linux-amd64
            janus-linux-arm64
