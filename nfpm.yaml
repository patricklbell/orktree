name: orktree
arch: ${ARCH}
platform: linux
version: ${VERSION}
section: vcs
maintainer: Patrick Bell
description: Git worktrees with copy-on-write overlay — no file duplication
vendor: patricklbell
homepage: https://github.com/patricklbell/orktree
license: MIT
depends:
  - fuse-overlayfs
  - git
contents:
  - src: dist/orktree-linux-${ARCH}
    dst: /usr/bin/orktree
    file_info:
      mode: 0755
  - src: completions/orktree.bash
    dst: /usr/share/bash-completion/completions/orktree
  - src: completions/orktree.zsh
    dst: /usr/share/zsh/site-functions/_orktree
  - src: man/man1/
    dst: /usr/share/man/man1/
    type: tree
